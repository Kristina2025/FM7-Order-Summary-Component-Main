<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="index.css" />

    <title>Frontend Mentor | Order summary card</title>
  </head>
  <body>
    <main>
      <article class="card">
        <img
          alt=""
          src="images/illustration-hero.svg"
          width="450"
          height="220"
          class="card__img"
        />
        <div class="card__content">
          <h1 class="card__title">Order Summary</h1>
          <p class="card__description">
            You can now listen to millions of songs, audiobooks, and podcasts on
            any device anywhere you like!
          </p>
          <div class="card__plan-container">
            <div class="card__plan">
              <img
                alt="Music icon"
                src="images/icon-music.svg"
                width="48"
                height="48"
                class="card__plan-img"
              />
              <div class="card__plan-data">
                <h2 class="card__plan-type">Annual Plan</h2>
                <p class="card__plan-price">$59.99/year</p>
              </div>
            </div>
            <a class="card__plan-action" href="#"
              >Change<span class="sr-only">Annual Plan</span></a
            >
          </div>
          <button class="card__btn" type="button">Proceed to Payment</button>
          <a class="card__cancel" href="#">Cancel Order</a>
        </div>
      </article>
    </main>
  </body>
</html>
